<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — AfriTrust</title>
  <script>document.documentElement.classList.add('js');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <!-- LOGIN GATE -->
  <div id="adminLogin">
    <header class="site-nav scrolled">
      <div class="container nav-inner">
        <a href="index.html" class="brand">
          <span class="mark" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.4 7.7 8 10 4.6-2.3 8-5 8-10V6l-8-4Z"/><path d="m9 12 2 2 4-4"/></svg></span>
          AfriTrust <span style="font-weight:600;color:var(--ink-sub);font-family:var(--font-body);font-size:.9rem">· Admin</span>
        </a>
      </div>
    </header>
    <main class="app-main">
      <div class="auth-wrap">
        <div class="auth-card">
          <h1>Admin sign in</h1>
          <p class="sub">Enter the admin password to manage members and payout requests.</p>
          <div class="form-error" id="loginError" style="display:none"></div>
          <form id="adminLoginForm">
            <div class="field">
              <label for="adminPassword">Password</label>
              <input class="input" type="password" id="adminPassword" autocomplete="current-password" placeholder="Admin password" />
            </div>
            <button class="btn btn-primary btn-block btn-lg" type="submit" id="adminLoginBtn">Sign in</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <!-- DASHBOARD -->
  <div id="adminApp" style="display:none">
    <div class="admin-shell">
      <aside class="admin-side">
        <a href="index.html" class="brand">
          <span class="mark" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.4 7.7 8 10 4.6-2.3 8-5 8-10V6l-8-4Z"/><path d="m9 12 2 2 4-4"/></svg></span>
          AfriTrust
        </a>
        <nav class="admin-nav" id="adminNav">
          <button data-tab="withdrawals" class="active">Withdrawals</button>
          <button data-tab="codes">Codes</button>
          <button id="adminLogout" style="margin-top:auto;color:#f1b8b0">Log out</button>
        </nav>
      </aside>

      <div class="admin-body">
        <!-- WITHDRAWALS -->
        <section class="admin-tabpane active" id="tab-withdrawals">
          <div class="admin-topbar">
            <div><span class="eyebrow">Payout requests</span><h2 style="margin-top:8px">Withdrawals</h2></div>
            <button class="btn btn-ghost btn-sm" id="refreshWithdrawals">Refresh</button>
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead><tr>
                <th>Date</th><th>Name</th><th>Contact</th><th>Amount</th><th>Bank</th><th>Account name</th>
                <th>Account no.</th><th>Type</th><th>Country</th><th>Code</th><th>Status</th><th>Action</th>
              </tr></thead>
              <tbody id="withdrawalsBody"></tbody>
            </table>
            <div id="withdrawalsEmpty"></div>
          </div>
        </section>

        <!-- CODES -->
        <section class="admin-tabpane" id="tab-codes">
          <div class="admin-topbar">
            <div><span class="eyebrow">Membership confirmation</span><h2 style="margin-top:8px">One-time codes</h2></div>
            <button class="btn btn-primary btn-sm" id="genOtpBtn">Generate code</button>
          </div>
          <div class="form-note" id="newCodeBanner" style="display:none"></div>
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Code</th><th>Status</th><th>Note</th><th>Created</th><th>Used</th><th>Action</th></tr></thead>
              <tbody id="codesBody"></tbody>
            </table>
            <div id="codesEmpty"></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/util.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
