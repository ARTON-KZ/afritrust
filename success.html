<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request received — AfriTrust</title>
  <script>document.documentElement.classList.add('js');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <header class="site-nav scrolled">
    <div class="container nav-inner">
      <a href="index.html" class="brand">
        <span class="mark" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.4 7.7 8 10 4.6-2.3 8-5 8-10V6l-8-4Z"/><path d="m9 12 2 2 4-4"/></svg></span>
        AfriTrust
      </a>
      <nav class="nav-cta"><a href="index.html" class="link-arrow">← Back to home</a></nav>
    </div>
  </header>

  <main class="app-main">
    <div class="success-wrap">
      <div class="panel success-card">
        <div class="success-icon" aria-hidden="true">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <h1>Request received</h1>
        <p class="muted" style="margin-top:12px; max-width:42ch; margin-inline:auto">Your withdrawal is verified and with our payout team. We'll transfer the money to your bank — most payouts arrive within 24 hours.</p>
        <div><span class="ref-pill" id="ref">—</span></div>
        <div style="margin-top:28px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap">
          <a href="index.html" class="btn btn-primary">Back to home</a>
          <a href="withdraw.html" class="btn btn-ghost">Make another request</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const ref = new URLSearchParams(location.search).get('ref');
      document.getElementById('ref').textContent = ref ? 'Reference: ' + ref : 'Reference unavailable';
    })();
  </script>
</body>
</html>
