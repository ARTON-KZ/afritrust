<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crear cuenta — AfriTrust</title>
  <script>document.documentElement.classList.add('js');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <header class="site-nav scrolled">
    <div class="container nav-inner">
      <a href="index.html" class="brand">
        <span class="mark" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.4 7.7 8 10 4.6-2.3 8-5 8-10V6l-8-4Z"/><path d="m9 12 2 2 4-4"/></svg></span>
        AfriTrust
      </a>
      <nav class="nav-cta">
        <a href="index.html" class="link-arrow nav-back" data-i18n="reg-back">← Volver al inicio</a>
        <button id="langToggle" class="btn btn-ghost btn-sm" style="margin-left:8px">English</button>
      </nav>
    </div>
  </header>

  <main class="app-main auth-wrap">
    <div class="auth-card">
      <span class="eyebrow" style="margin-bottom:var(--sp-4)">AfriTrust</span>
      <h1 data-i18n-html="reg-title">CREAR <span class="accent" style="color:var(--gold)">CUENTA</span></h1>
      <p class="sub" data-i18n="reg-sub">Completa el formulario para registrarte.</p>

      <div class="form-error" id="authError" style="display:none"></div>

      <form id="registerForm" novalidate>
        <div class="field">
          <label for="name" data-i18n="reg-name-label">Nombre completo</label>
          <input class="input" id="name" type="text" autocomplete="name" required
            data-i18n-placeholder="reg-name-ph" placeholder="Juan Pérez" />
        </div>

        <div class="field">
          <label for="email" data-i18n="reg-email-label">Correo electrónico</label>
          <input class="input" id="email" type="email" autocomplete="email" required
            data-i18n-placeholder="reg-email-ph" placeholder="tu@ejemplo.com" />
        </div>

        <div class="field">
          <label for="password" data-i18n="reg-pass-label">Contraseña</label>
          <input class="input" id="password" type="password" autocomplete="new-password" required
            data-i18n-placeholder="reg-pass-ph" placeholder="Mínimo 8 caracteres" />
        </div>

        <div class="field">
          <label for="currency" data-i18n="reg-currency-label">Moneda principal</label>
          <select class="select" id="currency" required>
            <option value="MXN">MXN — Peso mexicano (México)</option>
            <option value="ARS">ARS — Peso argentino (Argentina)</option>
            <option value="CLP">CLP — Peso chileno (Chile)</option>
            <option value="COP">COP — Peso colombiano (Colombia)</option>
            <option value="PEN">PEN — Sol peruano (Perú)</option>
            <option value="BOB">BOB — Boliviano (Bolivia)</option>
            <option value="PYG">PYG — Guaraní (Paraguay)</option>
            <option value="VES">VES — Bolívar (Venezuela)</option>
            <option value="USD">USD — Dólar (Ecuador / EE. UU.)</option>
            <option value="EUR">EUR — Euro</option>
            <option value="GBP">GBP — Libra esterlina</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:var(--sp-2)" data-i18n="reg-btn">Crear cuenta</button>
      </form>

      <p class="auth-foot">
        <span data-i18n="reg-have-account">¿Ya tienes cuenta?</span>
        <a href="login.html" style="color:var(--forest);font-weight:700;margin-left:6px" data-i18n="reg-login">Inicia sesión</a>
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
