<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión — AfriTrust</title>
  <script>document.documentElement.classList.add('js');
    // Already signed in? Go straight back to the dashboard.
    if (localStorage.getItem('afritrust_token')) location.replace('dashboard.html');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <header class="site-nav scrolled">
    <div class="container nav-inner">
      <a href="index.html" class="brand">
        <span class="mark" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.4 7.7 8 10 4.6-2.3 8-5 8-10V6l-8-4Z"/><path d="m9 12 2 2 4-4"/></svg></span>
        AfriTrust
      </a>
      <nav class="nav-cta">
        <a href="index.html" class="link-arrow nav-back" data-i18n="login-back">← Volver al inicio</a>
        <button id="langToggle" class="btn btn-ghost btn-sm" style="margin-left:8px">English</button>
      </nav>
    </div>
  </header>

  <main class="app-main auth-wrap">
    <div class="auth-card">
      <span class="eyebrow" style="margin-bottom:var(--sp-4)">AfriTrust</span>
      <h1 data-i18n-html="login-title">INICIO DE <span class="accent" style="color:var(--gold)">SESIÓN</span></h1>
      <p class="sub" data-i18n="login-sub">Ingresa tu correo y contraseña para acceder a tu cuenta.</p>

      <!-- Shown when ?registered=1 is in the URL -->
      <div class="form-note" id="registeredBanner" style="display:none" data-i18n="login-registered-msg">
        Cuenta creada. Por favor inicia sesión.
      </div>

      <div class="form-error" id="authError" style="display:none"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email" data-i18n="login-email-label">Correo electrónico</label>
          <input class="input" id="email" type="email" autocomplete="email" required
            data-i18n-placeholder="login-email-ph" placeholder="tu@ejemplo.com" />
        </div>

        <div class="field">
          <label for="password" data-i18n="login-pass-label">Contraseña</label>
          <input class="input" id="password" type="password" autocomplete="current-password" required
            data-i18n-placeholder="login-pass-ph" placeholder="Tu contraseña" />
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:var(--sp-2)" data-i18n="login-btn">Entrar</button>
      </form>

      <p class="auth-foot">
        <span data-i18n="login-no-account">¿No tienes cuenta?</span>
        <a href="register.html" style="color:var(--forest);font-weight:700;margin-left:6px" data-i18n="login-register">Regístrate</a>
      </p>
    </div>
  </main>

  <script>
    // Show the registered-success banner without waiting for i18n to load
    if (new URLSearchParams(location.search).get('registered') === '1') {
      document.getElementById('registeredBanner').style.display = '';
    }
  </script>
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
